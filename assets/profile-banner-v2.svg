<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 600" width="1800" height="600" role="img" aria-label="sleepyDog-sudo profile banner">
  <defs>
    <linearGradient id="leftWash" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff8ee" stop-opacity="0.92"/>
      <stop offset="55%" stop-color="#fff8ee" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#fff8ee" stop-opacity="0"/>
    </linearGradient>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .eyebrow { font-size: 24px; font-weight: 700; letter-spacing: 0.22em; fill: #53606d; }
      .title { font-size: 74px; font-weight: 900; letter-spacing: -0.04em; fill: #222831; }
      .subtitle { font-size: 28px; font-weight: 700; letter-spacing: 0.02em; fill: #39424e; }
      .url { font-size: 26px; font-weight: 800; letter-spacing: 0.12em; fill: #315f86; }
      .chip { font-size: 18px; font-weight: 700; letter-spacing: 0.12em; fill: #53606d; }
    </style>
  </defs>

  <image href="data:image/jpeg;base64," x="0" y="0" width="1800" height="600" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="1060" height="600" fill="url(#leftWash)"/>

  <g class="mono" transform="translate(120 158)">
    <text class="eyebrow" x="0" y="0">RATSHAWTY ARCHIVE</text>
    <text class="title" x="0" y="92">sleepyDog-sudo</text>
    <text class="subtitle" x="4" y="150">digital art / arch linux / minecraft modding</text>
    <text class="url" x="4" y="208">SAVIOR666.XYZ</text>

    <line x1="4" y1="246" x2="600" y2="246" stroke="#315f86" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
    <line x1="4" y1="266" x2="410" y2="266" stroke="#222831" stroke-width="2" stroke-linecap="round" opacity="0.25"/>

    <g transform="translate(4 314)">
      <rect x="0" y="-26" width="144" height="44" rx="12" fill="#ffffff" fill-opacity="0.60" stroke="#d8d2c8"/>
      <text class="chip" x="22" y="3">ART</text>
      <rect x="166" y="-26" width="158" height="44" rx="12" fill="#ffffff" fill-opacity="0.60" stroke="#d8d2c8"/>
      <text class="chip" x="188" y="3">LINUX</text>
      <rect x="346" y="-26" width="224" height="44" rx="12" fill="#ffffff" fill-opacity="0.60" stroke="#d8d2c8"/>
      <text class="chip" x="368" y="3">MODDING</text>
    </g>
  </g>
</svg>